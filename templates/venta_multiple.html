{% extends "base.html" %}

{% block contenido %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white">

                <h3 class="mb-0">
                    🎟️ Venta Múltiple
                </h3>

            </div>

            <div class="card-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}

                    {% for category, message in messages %}

                        <div class="alert alert-{{ category }}">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}
            {% endwith %}
                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Números separados por comas
                        </label>

                        <input
                            type="text"
                            name="numeros"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Nombre
                        </label>

                        <input
                            type="text"
                            name="nombre"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Teléfono
                        </label>

                        <input
                            type="text"
                            name="telefono"
                            class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Correo
                        </label>

                        <input
                            type="email"
                            name="correo"
                            class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Estado de Pago
                        </label>

                        <select
                            name="pago"
                            class="form-select">

                            <option value="1">
                                Pagado
                            </option>

                            <option value="0">
                                Pendiente
                            </option>

                        </select>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success">

                        💾 Guardar Venta

                    </button>

                    <a
                        href="/"
                        class="btn btn-secondary">

                        ↩ Volver

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
