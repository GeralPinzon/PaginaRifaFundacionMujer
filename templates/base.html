<!DOCTYPE html>
<html>

<head>

    <title>Mujer Linda Cats</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#f5f6fa;
        }

        .sidebar{

            width:260px;
            height:100vh;

            position:fixed;

            background:linear-gradient(
                180deg,
                #343a40,
                #212529
            );

            color:white;

            padding-top:20px;

            box-shadow:
            4px 0px 10px rgba(0,0,0,0.2);

            overflow-y: auto;

            scrollbar-width: none;
        }

        .sidebar a{

            color:white;

            text-decoration:none;

            display:block;

            padding:12px 20px;
        }

        .sidebar a:hover{

            background:#ffc107;

            color:black;

            border-radius:8px;

            margin-left:10px;
            margin-right:10px;
        }

        .content{

            margin-left:260px;

            padding:35px;

            min-height:100vh;
            
        }
        .card{

            transition:0.3s;
        }

        .card:hover{

            transform:translateY(-5px);

            box-shadow:0px 8px 20px rgba(0,0,0,0.15);
        }
        .footer-info {
            opacity: 0.8;
            letter-spacing: 0.3px;
            }

    </style>

</head>

<body>

<div class="sidebar">

    <div class="text-center mb-4">

    <div style="
        width:80px;
        height:80px;
        background:#ffc107;
        border-radius:50%;
        margin:auto;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:40px;
    ">
        🐾
    </div>

    <h5 class="mt-3">
        Mujer Linda Cats
    </h5>

    <small class="text-light">
        Sistema de Rifas
    </small>

</div>

    <a href="/">🏠 Dashboard</a>

    <hr>

    <div class="px-3 text-uppercase small text-secondary">
        Rifas
    </div>

    <a href="/vender">🎟️ Vender Boleta</a>

    <a href="/venta_multiple">🎟️ Venta Múltiple</a>

    <a href="/disponibles">📋 Disponibles</a>

    <hr>

    <div class="px-3 text-uppercase small text-secondary">
        Pagos
    </div>

    <a href="/pendientes">💰 Pendientes</a>

    <a href="/marcar_pagado">✅ Marcar Pagado</a>

    <hr>

    <div class="px-3 text-uppercase small text-secondary">
        Consultas
    </div>

    <a href="/buscar">🔍 Buscar</a>

    <a href="/anular">❌ Anular</a>

</div>

<div class="content">

    {% block contenido %}

    {% endblock %}

</div>
<hr>

<div class="text-center mt-4 footer-info">
    <span class="d-block text-muted small fw-semibold">
        Fundación Mujer Linda Cats
    </span>
    <span class="d-block text-muted small">
        Sistema de Rifas v1.0
    </span>
</div>

</body>

</html>
