{% extends "base.html" %}

{% block contenido %}

<div class="card shadow border-0">

    <div class="card-header bg-secondary text-white">

        <h3 class="mb-0">
            🎟️ Números Disponibles
        </h3>

    </div>

    <div class="card-body">

        <div class="row mb-3">

            <div class="col-md-6">

                <h5>
                    Total Disponibles:
                    <span class="badge bg-success">
                        {{ disponibles|length }}
                    </span>
                </h5>

            </div>

            <div class="col-md-6 text-end">

                <button
                    class="btn btn-success"
                    onclick="copiarDisponibles()">

                    📋 Copiar para WhatsApp

                </button>

            </div>

        </div>

        <textarea
            id="listaDisponibles"
            class="form-control"
            rows="15"
            readonly
            style="font-family: Consolas, monospace;">{{ texto_disponibles }}</textarea>

    </div>

</div>

<script>

function copiarDisponibles() {

    const textarea =
        document.getElementById("listaDisponibles");

    textarea.select();

    navigator.clipboard.writeText(
        textarea.value
    );

    alert(
        "✅ Lista copiada al portapapeles"
    );

}

</script>

{% endblock %}
